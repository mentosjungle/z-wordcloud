name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # ✅ 必需：允许上传 Release 资产

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # ✅ 自动缓存 node_modules

      - name: Install dependencies
        run: npm ci  # ✅ CI 专用，依赖锁定 + 速度更快
        shell: bash

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Configure Cargo registry
        shell: bash  # ✅ Windows/macOS/Linux 统一使用 bash，避免平台差异
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [registries.crates-io]
          protocol = "sparse"
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config
        shell: bash

      - name: Set version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting version to $VERSION"
          perl -pi -e "s/^version = \"0\\.0\\.0\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          perl -pi -e "s/\"version\": \"0\\.0\\.0\"/\"version\": \"$VERSION\"/" package.json

      - name: Generate multi-platform icons
        shell: bash
        run: npx tauri icon src-tauri/icons/icon.svg

      - name: Build desktop app with Tauri
        run: npm run tauri:build
        shell: bash
        env:
          RUSTUP_DIST_SERVER: https://static.rust-lang.org
          RUSTUP_UPDATE_ROOT: https://static.rust-lang.org/rustup
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

      - name: "Debug: List bundled artifacts"
        shell: bash
        run: |
          echo "=== Bundle directory structure ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || true

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}