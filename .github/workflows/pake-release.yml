name: Pake 云端打包发布
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖并构建 Vue 项目
        run: |
          npm install
          npm run build

      - name: 配置 Rust 环境（强制使用官方源）
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: 覆盖 Cargo 镜像配置（解决 rsproxy 超时）
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [registries.crates-io]
          protocol = "sparse"
          [source.crates-io]
          replace-with = "crates-io"
          EOF

      - name: 安装 Linux 系统依赖 (仅 Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装 Pake CLI
        run: npm install -g pake-cli

      - name: 使用 Pake 打包
        run: pake ./dist --name WordCloud --width 800 --height 600
        env:
          # 确保 Rust 编译不走任何代理或国内镜像
          RUSTUP_DIST_SERVER: https://static.rust-lang.org
          RUSTUP_UPDATE_ROOT: https://static.rust-lang.org/rustup
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

      - name: 上传安装包到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WordCloud_*.exe
            WordCloud_*.msi
            WordCloud_*.dmg
            WordCloud_*.deb
            WordCloud_*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}