name: Pake 云端打包发布
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖并构建 Vue 项目
        run: |
          npm install
          npm run build

      - name: 安装 Linux 系统依赖 (仅 Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装 Pake CLI
        run: npm install -g pake-cli

      - name: 使用 Pake 打包
        run: pake ./dist --name WordCloud --width 800 --height 600

      - name: 上传安装包到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WordCloud_*.exe
            WordCloud_*.msi
            WordCloud_*.dmg
            WordCloud_*.deb
            WordCloud_*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}